version: 0.2

env:
  variables:
    LAMBDA_FUNCTION_NAME: "job_campaign_worker"
    AWS_DEFAULT_REGION: "ap-southeast-2"
    S3_BUCKET_NAME: "triggerlambda0312255"

phases:
  install:
    commands:
      - echo "Installing dependencies..."
      - pip install --upgrade pip
      - pip install -r requirements.txt -t ./package

  pre_build:
    commands:
      - echo "Preparing zip package..."
      - mkdir -p output
      - cd package
      - zip -r ../output/function.zip .
      - cd ..
      - zip -g output/function.zip lambda_function.py

  build:
    commands:
      - echo "Uploading function.zip to S3..."
      - aws s3 cp output/function.zip s3://$S3_BUCKET_NAME/job_campaign_worker/function.zip

  post_build:
    commands:
      - echo "Updating Lambda function..."
      - aws lambda update-function-code \
          --function-name "$LAMBDA_FUNCTION_NAME" \
          --s3-bucket "$S3_BUCKET_NAME" \
          --s3-key "job_campaign_worker/function.zip" \
          --publish
      - echo "Deployment complete!"

artifacts:
  files:
    - output/function.zip
