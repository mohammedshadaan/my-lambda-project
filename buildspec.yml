version: 0.2
env:
  variables:
    LAMBDA_FUNCTION: "test-lambda-function"
    AWS_DEFAULT_REGION: "ap-southeast-2"
phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "Installing dependencies..."
      - npm install
  pre_build:
    commands:
      - echo "Current directory contents:"
      - pwd
      - ls -la
      - echo "Searching for index.mjs anywhere in repo..."
      - find . -name "index.mjs" -not -path "*/node_modules/*"
      - test -f index.mjs || (echo "ERROR: index.mjs not found at repo root" && exit 1)
  build:
    commands:
      - rm -f function.zip
      - zip -r function.zip index.mjs package.json node_modules
      - ls -lh function.zip
  post_build:
    commands:
      - aws lambda update-function-code --function-name "$LAMBDA_FUNCTION" --zip-file fileb://function.zip --publish
      - aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION"
      - echo "Deployed!"
artifacts:
  files:
    - function.zip
  discard-paths: yes
