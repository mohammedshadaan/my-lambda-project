version: 0.2

env:
  variables:
    S3_BUCKET: "triggerlambda031225"
    LAMBDA_FUNCTION: "test-lambda-function"

phases:
  install:
    runtime-versions:
      nodejs: 18
  
  pre_build:
    commands:
      - echo "Starting pre-build phase..."
  
  build:
    commands:
      - echo "Cleaning old package..."
      - rm -f function.zip
      - echo "Creating deployment package..."
      - zip -r function.zip index.mjs package.json package-lock.json node_modules
      - echo "Verifying zip contents..."
      - unzip -l function.zip
      - echo "Uploading package to S3..."
      - aws s3 cp function.zip "s3://$S3_BUCKET/builds/function-$CODEBUILD_RESOLVED_SOURCE_VERSION.zip"
  
  post_build:
    commands:
      - echo "Deploying new code to Lambda from S3..."
      - |
        aws lambda update-function-code \
          --function-name $LAMBDA_FUNCTION \
          --s3-bucket $S3_BUCKET \
          --s3-key "builds/function-$CODEBUILD_RESOLVED_SOURCE_VERSION.zip"
      - echo "Waiting for function update to complete..."
      - aws lambda wait function-updated --function-name $LAMBDA_FUNCTION
      - echo "Lambda function updated successfully!"
      - echo "Getting updated function info..."
      - aws lambda get-function --function-name $LAMBDA_FUNCTION --query 'Configuration.[FunctionName,LastModified,CodeSha256]'
