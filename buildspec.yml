version: 0.2

env:
  variables:
    LAMBDA_FUNCTION_DEV: "jobcampaignworker-dev"
    AWS_DEFAULT_REGION: "ap-southeast-2"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm ci --omit=dev

  pre_build:
    commands:
      - echo "Verifying files..."
      - test -f index.mjs || (echo "ERROR: index.mjs not found!" && exit 1)
      - test -d src/handlers || (echo "ERROR: src/handlers not found!" && exit 1)
      - echo "Running tests..."
      - npm test

  build:
    commands:
      - echo "Building deployment package..."
      - rm -f function.zip
      - zip -r function.zip index.mjs src/ package.json package-lock.json node_modules
      - echo "Zip contents:"
      - unzip -l function.zip
      - ls -lh function.zip

  post_build:
    commands:
      - echo "Deploying to DEV..."
      - aws lambda update-function-code
          --function-name "$LAMBDA_FUNCTION_DEV"
          --zip-file fileb://function.zip
          --publish
      - aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION_DEV"
      - echo "DEV deployed!"

artifacts:
  files:
    - function.zip
  discard-paths: yes
