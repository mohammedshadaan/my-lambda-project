version: 0.2

env:
  variables:
    LAMBDA_FUNCTION_NAME: "job_campaign_worker"
    AWS_DEFAULT_REGION: "ap-southeast-2"
    S3_BUCKET_NAME: "triggerlambda0312255"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "📦 Installing Node.js dependencies..."
      - npm install --omit=dev

  build:
    commands:
      - echo "🏗️ Starting build..."
      - mkdir -p package
      - cp -R * package
      - cd package
      - zip -r ../function.zip . -x "*.md" "*.git*" "buildspec*" ".git/*" "node_modules/.cache/*"
      - cd ..

  post_build:
    commands:
      - echo "☁️ Uploading ZIP to S3 folder job_campaign_worker..."
      - aws s3 cp function.zip s3://$S3_BUCKET_NAME/job_campaign_worker/function.zip

      - echo "🚀 Updating Lambda function..."
      - aws lambda update-function-code \
          --function-name $LAMBDA_FUNCTION_NAME \
          --s3-bucket $S3_BUCKET_NAME \
          --s3-key job_campaign_worker/function.zip \
          --publish

      - echo "🎉 Lambda updated successfully!"

artifacts:
  files:
    - function.zip
  discard-paths: yes
