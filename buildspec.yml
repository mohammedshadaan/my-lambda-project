version: 0.2
env:
  variables:
    LAMBDA_FUNCTION: "Testing_Automation"
    AWS_DEFAULT_REGION: "ap-southeast-2"
phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm ci --omit=dev
  pre_build:
    commands:
      - echo "Verifying files..."
      - test -f index.mjs || (echo "ERROR index.mjs not found" && exit 1)
  build:
    commands:
      - rm -f function.zip
      - zip -r function.zip index.mjs src/ package.json node_modules
      - ls -lh function.zip
  post_build:
    commands:
      - aws lambda update-function-code --function-name "$LAMBDA_FUNCTION" --zip-file fileb://function.zip --publish
      - aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION"
      - echo "Deployed!"
artifacts:
  files:
    - function.zip
  discard-paths: yes
  
